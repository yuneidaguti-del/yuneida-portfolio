<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contact | Yuneida Gutierrez</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Yuneida Gutierrez</a>
  <ul class="nav-links">
    <li><a href="services.html">Services</a></li>
    <li><a href="portfolio.html">Portfolio</a></li>
    <li><a href="ugc.html">Content & UGC</a></li>
    <li><a href="contact.html" class="active">Contact</a></li>
  </ul>
</nav>

<div class="page-hero">
  <span class="section-tag">Let's Work Together</span>
  <h1>Ready to start<br><em>something?</em></h1>
  <p>Whether you have a full brief or just a spark of an idea, I'd love to hear from you.</p>
</div>

<section class="contact reveal">
  <div class="contact-inner">
    <div class="contact-form">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Your Name</label>
          <input class="form-input" type="text" placeholder="Jane Smith" />
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" placeholder="jane@example.com" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Service Needed</label>
        <input class="form-input" type="text" placeholder="e.g. Content Creation, Social Media, Influencer Management…" />
      </div>
      <div class="form-group">
        <label class="form-label">Tell me about your project</label>
        <textarea class="form-textarea" placeholder="Describe your project, timeline, and budget…"></textarea>
      </div>
      <button class="btn-submit">Send Message</button>
    </div>
  </div>
</section>

<footer>
  <span>© 2026 Yuneida Gutierrez. All rights reserved.</span>
  <div class="footer-socials">
    <a href="https://www.instagram.com/yuneidaguti/" target="_blank">Instagram</a>
    <a href="https://www.tiktok.com/@yuneidaguti" target="_blank">TikTok</a>
    <a href="https://www.linkedin.com/in/yuneidagutierrez/" target="_blank">LinkedIn</a>
    <a href="mailto:yuneida.guti@gmail.com">Email</a>
  </div>
</footer>

<script>
  const reveals = document.querySelectorAll('.reveal');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.1 });
  reveals.forEach(r => observer.observe(r));
</script>
<script src="chat-widget.js"></script>
</body>
</html>
